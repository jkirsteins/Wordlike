repos:
  - repo: local
    hooks:
      - id: check-wordlist-blanks
        name: Check word list files for blank lines
        entry: Scripts/check-wordlist-blanks.sh
        language: script
        files: '^Resources/.*\.txt$'
        # Exclude gen 0 answer files — loadRaw() depends on their exact layout
        exclude: '^Resources/[a-zA-Z-]+_A\.txt$'

      - id: wordlike-tests
        name: Run WordlikeTests
        entry: Scripts/run-tests.sh
        language: script
        pass_filenames: false
        always_run: true
